{% extends "base.html" %}

{% block title %}

Event Successfully Created

{% endblock %}

{% block content %}
    
      <!-- Event Successfully Created Form-->
      <div class="container">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a href="{{ url_for('index') }}">Home</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">
              Create Events
            </li>
          </ol>
        </nav>
    
        <div class="event-form mt-5">
          <div class="row justify-content-center">
            
            <!-- Display Event Created message -->
            <h1 class="text-center mb-5">
              Event Created Successfully
            </h1>
    
            <div class="col-lg-10 col-md-12">
              <div class="card p-4 shadow-sm text-center">
                <div class="text-center mb-4">
                  <i class="bi bi-check-circle-fill text-success display-1"></i>
                </div>
    
                <h2 class="alert alert-success">
                  Event Published
                </h2>
    
                <p class="text-muted">
                  Your festival event has been successfully created and is published.
                </p>
    
                <!-- Button to return to the homepage after successful creation -->
                <div class="mt-4">
                  <a href="{{ url_for('index') }}" class="btn btn-primary mb-2">
                    Return to Homepage
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

{% endblock %}
